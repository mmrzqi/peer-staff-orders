<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Peer · Staff Operations</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0B2545">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
window.OneSignalDeferred = window.OneSignalDeferred || [];
OneSignalDeferred.push(async function(OneSignal) {
  await OneSignal.init({
    appId: "99445503-cdf7-459f-9a94-ba88dee6b764",
    serviceWorkerPath: "OneSignalSDKWorker.js",
    serviceWorkerUpdaterPath: "OneSignalSDKUpdaterWorker.js",
    serviceWorkerParam: { scope: "/peer-staff-orders/" },
    notifyButton: { enable: true }
  });
});
</script>
<style>
:root{--navy:#0B2545;--cream:#f7f4ef;--line:rgba(11,37,69,.14);--muted:rgba(10,10,10,.55);--ok:#0f5b3a;--danger:#8b1e1e;--warn:#9a6b00;--soft:rgba(11,37,69,.06);--shadow:0 14px 34px rgba(11,37,69,.12);--display:'Space Grotesk',sans-serif;--body:'Inter',sans-serif}
*{box-sizing:border-box}body{margin:0;font-family:var(--body);background:linear-gradient(#fff,var(--cream));color:#111}button,input,select{font:inherit}button{cursor:pointer}.hidden{display:none!important}
.top{position:sticky;top:0;background:var(--navy);color:white;z-index:10;padding:13px 16px;box-shadow:0 8px 22px rgba(0,0,0,.18)}.topin{max-width:1180px;margin:auto;display:flex;justify-content:space-between;align-items:center;gap:10px}.brand{display:flex;gap:12px;align-items:center}.logo{width:40px;height:40px;border:1px solid rgba(255,255,255,.35);border-radius:50%;display:grid;place-items:center;font-weight:900;font-family:var(--display)}.title{font-family:var(--display);font-weight:800}.sub{font-size:12px;opacity:.7}.pills{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.pill{border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:7px 10px;font-size:12px;background:rgba(255,255,255,.07)}
.btn{border:0;border-radius:12px;padding:10px 13px;font-weight:800;background:white;color:var(--navy)}.btn.primary{background:var(--navy);color:white}.btn.outline{border:1.5px solid var(--navy);background:white;color:var(--navy)}.btn.danger{background:var(--danger);color:white}.btn.small{padding:7px 10px;font-size:12px}.btn:disabled{opacity:.5}
.wrap{max-width:1180px;margin:auto;padding:18px 16px 60px}.login{min-height:100dvh;display:grid;place-items:center;padding:20px}.card{background:white;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:20px;margin-bottom:16px}.login .card{width:min(460px,100%);padding:28px}.card h1,.card h2{font-family:var(--display);color:var(--navy);margin:0 0 12px}.hint{color:var(--muted);line-height:1.5}.field{display:grid;gap:6px;margin-bottom:12px}.field label{font-size:12px;font-weight:900;color:var(--muted);text-transform:uppercase}input,select{border:1.5px solid var(--line);border-radius:12px;padding:12px;width:100%;background:white}.tabs{display:flex;gap:8px;overflow:auto;margin-bottom:18px}.tabs button{white-space:nowrap;background:white;border:1px solid var(--line);border-radius:999px;padding:10px 14px;font-weight:900;color:var(--muted)}.tabs .active{background:var(--navy);color:white}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.stat{background:white;border:1px solid var(--line);border-radius:18px;padding:16px}.stat b{font-family:var(--display);font-size:32px;color:var(--navy)}.stat span{display:block;color:var(--muted);font-size:12px;font-weight:900;text-transform:uppercase}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.toolbar{display:flex;gap:8px;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:12px}.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}.ticket{background:white;border:1px solid var(--line);border-left:5px solid var(--navy);border-radius:18px;padding:15px;box-shadow:0 8px 22px rgba(11,37,69,.07)}.ticket.completed{border-left-color:var(--ok)}.ticket.cancelled{border-left-color:#999;opacity:.7}.ticket-head{display:flex;justify-content:space-between;gap:8px}.no{font-weight:900;color:var(--navy)}.meta{color:var(--muted);font-size:13px;margin:8px 0}.line{display:flex;gap:8px;align-items:center;border-bottom:1px solid rgba(0,0,0,.05);padding:8px 0}.line input{width:auto}.line .name{flex:1}.done{text-decoration:line-through;color:var(--muted)}.badge{font-size:10px;border-radius:999px;padding:4px 7px;font-weight:900;text-transform:uppercase}.urgent{background:#111;color:#fff}.low{background:#fff4d6;color:var(--warn)}.foot{display:flex;justify-content:flex-end;gap:8px;margin-top:10px;flex-wrap:wrap}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--line);padding:11px 8px;text-align:left;font-size:14px}.table th{font-size:11px;text-transform:uppercase;color:var(--muted)}.status{border-radius:999px;padding:5px 8px;font-size:12px;font-weight:900;display:inline-block}.ok{background:#e7f6ee;color:var(--ok)}.warn{background:#fff4d6;color:var(--warn)}.bad{background:#fde7e7;color:var(--danger)}.row{display:grid;grid-template-columns:1.2fr 1.8fr .8fr .8fr .7fr 38px;gap:8px;align-items:end;border-bottom:1px dashed var(--line);padding:10px 0}.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:50;background:#111;color:#fff;border-radius:14px;padding:12px 16px;box-shadow:0 12px 30px rgba(0,0,0,.25)}
@media(max-width:760px){.wrap{padding:12px 12px 80px}.stats,.grid2{grid-template-columns:1fr}.row{grid-template-columns:1fr 1fr}.board{grid-template-columns:1fr}.sub,.clock{display:none}.topin{align-items:flex-start}.stat b{font-size:26px}.table{display:block;overflow:auto}}
</style>
</head>
<body>
<div id="login" class="login">
  <section class="card">
    <div class="logo" style="background:var(--navy);color:white;margin-bottom:14px">P</div>
    <h1>Peer Staff Operations</h1>
    <p class="hint">Orders, branches, staff access, kitchen stock counting, and push notifications.</p>
    <div class="field"><label>Name</label><input id="loginName" placeholder="e.g. Mohammed"></div>
    <div class="field"><label>Role</label><select id="loginRole"><option value="manager">Manager</option><option value="staff">Staff</option><option value="kitchen">Kitchen</option></select></div>
    <div class="field"><label>Password</label><input id="loginPass" type="password" placeholder="Password"></div>
    <button id="loginBtn" class="btn primary" style="width:100%">Enter app</button>
    <p class="hint" style="font-size:12px">Manager password: hummerusa. Staff and Kitchen must be approved by the manager.</p>
  </section>
</div>

<div id="app" class="hidden">
  <header class="top"><div class="topin"><div class="brand"><div class="logo">P</div><div><div class="title">Peer Staff Operations</div><div class="sub">Orders · Inventory · Branches · Notifications</div></div></div><div class="pills"><span class="pill" id="userPill"></span><span class="pill clock" id="clock"></span><button id="logout" class="btn small">Logout</button></div></div></header>
  <main class="wrap">
    <nav class="tabs" id="tabs"></nav>
    <section id="dashboard" class="view"></section>
    <section id="orders" class="view hidden"></section>
    <section id="inventory" class="view hidden"></section>
    <section id="staff" class="view hidden"></section>
    <section id="settings" class="view hidden"></section>
  </main>
</div>
<div id="toast" class="toast hidden"></div>

<script>
const SUPABASE_URL="https://vrgmdoyjdvndakgslbzr.supabase.co";
const SUPABASE_KEY="sb_publishable_Wla1jlliD6AnFv3y26XeYg_LP5nXc45";
const supabaseClient=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const KEY="peer_ops_clean_session";
const CATS=[["cakes","🍰","Cakes"],["cookies","🍪","Cookies"],["drinks","🥤","Cups & Drinks"],["ingredients","🥛","Ingredients"],["coffee","☕","Coffee Beans"],["other","📦","Other"]];
let state={session:null,tab:"dashboard",filter:"pending",branchFilter:"all",query:"",draftOpen:false,data:{orders:[],inventory:[],staff:[],allowedStaff:[],branches:[]}};
let draft=[];let channel=null;let known={};

function $(id){return document.getElementById(id)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function toast(m){$("toast").textContent=m;$("toast").classList.remove("hidden");clearTimeout(window.__toast);window.__toast=setTimeout(()=>$("toast").classList.add("hidden"),2400)}
function same(a,b){return String(a||"").trim().toLowerCase()===String(b||"").trim().toLowerCase()}
function today(){let d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10)}
function fmt(d){try{return new Date(d+"T00:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"})}catch(e){return d}}
function canManage(){return state.session?.role==="manager"}
function canViewInv(){return state.session&&(state.session.role==="manager"||state.session.role==="kitchen")}
function canEditInv(){return state.session?.role==="kitchen"}
function mainBranch(){ensureData();return state.data.branches[0].id}
function branchName(id){ensureData();let b=state.data.branches.find(x=>x.id===id);return b?b.name:"Main"}
function cat(k){let c=CATS.find(x=>x[0]===k);return c?c[1]+" "+c[2]:"📦 Other"}
function visibleOrders(){return canManage()?state.data.orders:state.data.orders.filter(o=>o.branchId===state.session.branchId)}
function visibleInv(){return canManage()?state.data.inventory:state.data.inventory.filter(i=>i.branchId===state.session.branchId)}
function ensureData(){
  state.data.orders ||= [];
  state.data.inventory ||= [];
  state.data.staff ||= [];
  state.data.allowedStaff ||= [];
  state.data.branches ||= [];
  if(!state.data.branches.length)state.data.branches.push({id:"main",name:"Main"});
  state.data.orders.forEach(o=>{o.branchId ||= mainBranch()});
  state.data.inventory.forEach(i=>{i.branchId ||= mainBranch()});
  state.data.allowedStaff.forEach(s=>{s.branchId ||= mainBranch(); if(s.password===undefined)s.password="1234"});
}
function seed(){
  state.data={orders:[],branches:[{id:"main",name:"Main"}],inventory:[
    {id:uid(),branchId:"main",name:"12oz cups",category:"drinks",stock:24,min:40,unit:"pcs"},
    {id:uid(),branchId:"main",name:"7oz cups",category:"drinks",stock:18,min:30,unit:"pcs"},
    {id:uid(),branchId:"main",name:"Salted cream",category:"ingredients",stock:2,min:4,unit:"bottles"}
  ],staff:[],allowedStaff:[
    {id:uid(),name:"Barista",role:"staff",password:"1234",branchId:"main",active:true},
    {id:uid(),name:"Kitchen Team",role:"kitchen",password:"1234",branchId:"main",active:true}
  ]};
}
async function load(){
  let sess=localStorage.getItem(KEY); if(sess)state.session=JSON.parse(sess);
  const {data,error}=await supabaseClient.from("peer_data").select("data").eq("id","main").single();
  if(error||!data){seed();await save()} else state.data=data.data;
  ensureData();
}
async function save(){ensureData();const {error}=await supabaseClient.from("peer_data").upsert({id:"main",data:state.data});if(error)toast("Save error: "+error.message)}
async function refresh(show){
  const old={};state.data.orders.forEach(o=>old[o.id]=true);
  const {data,error}=await supabaseClient.from("peer_data").select("data").eq("id","main").single();
  if(error){if(show)toast("Refresh error");return}
  state.data=data.data;ensureData();
  visibleOrders().forEach(o=>{if(!old[o.id])localNotify(o)});
  remember();render();if(show)toast("Refreshed");
}
function remember(){known={};state.data.orders.forEach(o=>known[o.id]=true)}
function realtime(){
  if(channel) return;
  channel=supabaseClient.channel("peer_data_live").on("postgres_changes",{event:"UPDATE",schema:"public",table:"peer_data"},payload=>{
    if(!payload.new?.data)return;
    let newData=payload.new.data; let newOrders=newData.orders||[];
    newOrders.forEach(o=>{let canSee=canManage()||(state.session&&o.branchId===state.session.branchId);if(canSee&&!known[o.id])localNotify(o)});
    state.data=newData;ensureData();remember();if(state.session)render();
  }).subscribe();
}
function localNotify(o){if("Notification"in window&&Notification.permission==="granted"){new Notification("New Peer Order",{body:`Order No. ${String(o.number).padStart(3,"0")} · ${branchName(o.branchId)}`})}}
async function requestPush(){
  if(window.OneSignalDeferred){
    OneSignalDeferred.push(async OneSignal=>{
      try{await OneSignal.Notifications.requestPermission();toast("Notification request sent")}catch(e){toast("Notification request failed")}
    });
  }else if("Notification"in window){await Notification.requestPermission()}
}
function tagPush(name,role,branchId){
  if(!window.OneSignalDeferred)return;
  OneSignalDeferred.push(async OneSignal=>{
    try{
      await OneSignal.login(String(name).toLowerCase());
      OneSignal.User.addTag("role",role);
      OneSignal.User.addTag("branchId",branchId);
      OneSignal.User.addTag("branch",branchName(branchId));
    }catch(e){console.log(e)}
  });
}
async function sendPush(o){
  try{
    const {error}=await supabaseClient.functions.invoke("send-order-notification",{body:{branchId:o.branchId,branchName:branchName(o.branchId),orderNo:"No. "+String(o.number).padStart(3,"0")}});
    if(error)toast("Push error: "+error.message);
  }catch(e){toast("Push failed")}
}
function nextNo(){return state.data.orders.reduce((m,o)=>Math.max(m,o.number||0),0)+1}
function counts(){let orders=visibleOrders();return {pending:orders.filter(o=>o.status==="pending").length,done:orders.filter(o=>o.status==="completed").length,low:visibleInv().filter(i=>Number(i.stock)<=Number(i.min)).length,staff:state.data.allowedStaff.filter(s=>s.active).length}}

function render(){
  if(!state.session){$("login").classList.remove("hidden");$("app").classList.add("hidden");return}
  $("login").classList.add("hidden");$("app").classList.remove("hidden");
  $("userPill").textContent=`${state.session.name} · ${state.session.role} · ${branchName(state.session.branchId)}`;
  renderTabs();show(state.tab);renderDashboard();renderOrders();renderInventory();renderStaff();renderSettings();
}
function renderTabs(){
  let tabs=[["dashboard","Dashboard"],["orders","Orders"]];
  if(canViewInv())tabs.push(["inventory","Inventory"]);
  if(canManage())tabs.push(["staff","Staff"]);
  tabs.push(["settings","Settings"]);
  if(!canViewInv()&&state.tab==="inventory")state.tab="dashboard";
  if(!canManage()&&state.tab==="staff")state.tab="dashboard";
  $("tabs").innerHTML=tabs.map(t=>`<button class="${state.tab===t[0]?"active":""}" data-tab="${t[0]}">${t[1]}</button>`).join("");
}
function show(v){["dashboard","orders","inventory","staff","settings"].forEach(x=>$(x).classList.toggle("hidden",x!==v))}
function stats(){let c=counts();return `<div class="stats"><div class="stat"><span>Pending orders</span><b>${c.pending}</b></div><div class="stat"><span>Completed</span><b>${c.done}</b></div><div class="stat"><span>Low stock</span><b>${c.low}</b></div><div class="stat"><span>Approved staff</span><b>${c.staff}</b></div></div>`}
function renderDashboard(){
  let low=visibleInv().filter(i=>Number(i.stock)<=Number(i.min));
  $("dashboard").innerHTML=stats()+`<div class="grid2"><section class="card"><div class="toolbar"><h2>Today / Tomorrow</h2><button id="dashNew" class="btn primary">+ Order</button></div><div class="board">${filtered("pending").slice(0,4).map(ticket).join("")||"<p class='hint'>No pending orders.</p>"}</div></section>${canViewInv()?`<section class="card"><h2>Stock alerts</h2>${low.map(i=>`<div class="line"><span class="name"><b>${esc(i.name)}</b><br><small>${cat(i.category)} · ${branchName(i.branchId)}</small></span><span class="status bad">${i.stock} ${esc(i.unit)}</span></div>`).join("")||"<p class='hint'>All stock is OK.</p>"}</section>`:""}</div>`;
}
function filtered(f){
  let q=state.query.toLowerCase();
  return visibleOrders().filter(o=>{
    if(f!=="all"&&o.status!==f)return false;
    if(canManage()&&state.branchFilter!=="all"&&o.branchId!==state.branchFilter)return false;
    return !q||(o.orderedBy+" "+o.note+" "+o.items.map(i=>i.name).join(" ")).toLowerCase().includes(q);
  }).sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
}
function ticket(o){
  let done=o.items.filter(i=>i.received).length,total=o.items.length;
  let items=CATS.map(c=>{let list=o.items.filter(i=>i.category===c[0]);if(!list.length)return"";return `<b style="font-size:12px;color:var(--navy)">${c[1]} ${c[2]}</b>`+list.map(i=>`<label class="line"><input type="checkbox" data-check="${o.id}|${i.id}" ${i.received?"checked":""} ${o.status==="cancelled"?"disabled":""}><span class="name ${i.received?"done":""}">${esc(i.name)}</span><span>${esc(i.qty)}</span>${i.urgent?'<span class="badge urgent">Urgent</span>':""}</label>`).join("")}).join("");
  return `<article class="ticket ${o.status}"><div class="ticket-head"><span class="no">No. ${String(o.number).padStart(3,"0")}</span><span>${fmt(o.date)}</span></div><div class="meta"><b>${branchName(o.branchId)}</b> · By <b>${esc(o.orderedBy)}</b> · ${done}/${total} received ${o.note?"· "+esc(o.note):""}</div>${items}<div class="foot">${o.status==="pending"?`<button class="btn outline small" data-cancel="${o.id}">Cancel</button>`:""}${o.status==="cancelled"?`<button class="btn outline small" data-restore="${o.id}">Restore</button><button class="btn danger small" data-delete="${o.id}">Delete</button>`:""}</div></article>`
}
function orderForm(){
  if(!state.draftOpen)return"";
  return `<section class="card"><div class="toolbar"><h2>New order</h2><button id="closeForm" class="btn outline">Close</button></div><div class="grid2"><div class="field"><label>Date</label><input id="orderDate" type="date" value="${today()}"></div><div class="field"><label>Note</label><input id="orderNote" placeholder="Optional"></div></div><div id="rows"></div><button id="addRow" class="btn outline">+ Add item</button> <button id="saveOrder" class="btn primary">Confirm order</button></section>`
}
function renderOrders(){
  $("orders").innerHTML=`<div class="toolbar"><div><button id="newOrder" class="btn primary">+ New order</button> <button id="refresh" class="btn outline">↻ Refresh</button></div>${canManage()?`<select id="branchFilter"><option value="all">All branches</option>${state.data.branches.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join("")}</select>`:""}<select id="filter"><option value="pending">Pending</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option><option value="all">All</option></select><input id="search" placeholder="Search" value="${esc(state.query)}"></div>${orderForm()}<section class="card"><h2>Orders</h2><div class="board">${filtered(state.filter).map(ticket).join("")||"<p class='hint'>No orders found.</p>"}</div></section>`;
  if($("filter"))$("filter").value=state.filter;if($("branchFilter"))$("branchFilter").value=state.branchFilter;if(state.draftOpen)renderRows();
}
function newDraft(){state.draftOpen=true;state.tab="orders";draft=[{id:uid(),category:"cakes",name:"",qty:"1",urgent:false}];render()}
function renderRows(){$("rows").innerHTML=draft.map(i=>`<div class="row" data-row="${i.id}"><div class="field"><label>Category</label><select data-f="category">${CATS.map(c=>`<option value="${c[0]}" ${i.category===c[0]?"selected":""}>${c[1]} ${c[2]}</option>`).join("")}</select></div><div class="field"><label>Item</label><input data-f="name" value="${esc(i.name)}"></div><div class="field"><label>Qty</label><input data-f="qty" value="${esc(i.qty)}"></div><div class="field"><label>Urgent</label><select data-f="urgent"><option value="false">No</option><option value="true" ${i.urgent?"selected":""}>Yes</option></select></div><button class="btn outline" data-remove="${i.id}">×</button></div>`).join("")}
async function saveOrder(){
  let items=draft.filter(i=>i.name.trim()).map(i=>({id:i.id,category:i.category,name:i.name.trim(),qty:i.qty||"1",urgent:!!i.urgent,received:false}));
  if(!items.length){toast("Add at least one item");return}
  let o={id:uid(),number:nextNo(),branchId:state.session.branchId||mainBranch(),date:$("orderDate").value||today(),orderedBy:state.session.name,note:$("orderNote").value.trim(),status:"pending",createdAt:new Date().toISOString(),items};
  state.data.orders.unshift(o);state.draftOpen=false;draft=[];await save();remember();render();await sendPush(o);toast("Order added + notification sent");
}
function renderInventory(){
  if(!canViewInv()){$("inventory").innerHTML=`<section class="card"><h2>Inventory</h2><p class="hint">Only Kitchen and Manager can view inventory.</p></section>`;return}
  let rows=visibleInv().map(i=>{let low=Number(i.stock)<=Number(i.min);return `<tr><td><b>${esc(i.name)}</b><br><small>${branchName(i.branchId)}</small></td><td>${cat(i.category)}</td><td><b>${i.stock}</b> ${esc(i.unit)}</td><td>${i.min}</td><td><span class="status ${low?"bad":"ok"}">${low?"Low":"OK"}</span></td><td>${canEditInv()?`<button class="btn outline small" data-minus="${i.id}">−</button> <input type="number" min="1" value="1" data-step="${i.id}" style="width:62px;padding:7px"> <button class="btn outline small" data-plus="${i.id}">+</button> <button class="btn danger small" data-delinv="${i.id}">Delete</button>`:"View only"}</td></tr>`}).join("");
  $("inventory").innerHTML=`<section class="card"><div class="toolbar"><h2>Inventory</h2>${canEditInv()?`<button id="addInv" class="btn primary">+ Add item</button>`:""}</div><table class="table"><thead><tr><th>Item</th><th>Category</th><th>Stock</th><th>Min</th><th>Status</th><th>Count</th></tr></thead><tbody>${rows}</tbody></table></section>`;
}
function renderStaff(){
  if(!canManage())return;
  let branches=state.data.branches.map(b=>`<span class="status ok">${esc(b.name)}</span>`).join(" ");
  let approved=state.data.allowedStaff.map(s=>`<tr><td><b>${esc(s.name)}</b></td><td>${s.role}</td><td>${branchName(s.branchId)}</td><td>${esc(s.password)}</td><td><span class="status ${s.active?"ok":"warn"}">${s.active?"Allowed":"Blocked"}</span></td><td><button class="btn outline small" data-editacc="${s.id}">Edit</button> <button class="btn outline small" data-toggleacc="${s.id}">Toggle</button> <button class="btn danger small" data-delacc="${s.id}">Remove</button></td></tr>`).join("");
  $("staff").innerHTML=`<section class="card"><div class="toolbar"><h2>Branches</h2><button id="addBranch" class="btn primary">+ Add branch</button></div>${branches}</section><section class="card"><div class="toolbar"><h2>Approved Staff & Kitchen</h2><button id="addAcc" class="btn primary">+ Add access</button></div><table class="table"><thead><tr><th>Name</th><th>Role</th><th>Branch</th><th>Password</th><th>Status</th><th></th></tr></thead><tbody>${approved}</tbody></table></section>`;
}
function renderSettings(){
  $("settings").innerHTML=`<section class="card"><h2>Notifications</h2><p class="hint">Open from Home Screen, login, then enable notifications. Check OneSignal Audience → Subscriptions for Push Token.</p><button id="enablePush" class="btn primary">Enable notifications</button> <button id="testPush" class="btn outline">Test push</button></section><section class="card"><h2>Backup</h2><button id="export" class="btn outline">Export JSON</button> <button id="reset" class="btn danger">Reset cloud data</button></section>`;
}

document.addEventListener("click",async e=>{
  let t=e.target;
  if(t.id==="loginBtn"){
    let name=$("loginName").value.trim(),role=$("loginRole").value,pass=$("loginPass").value;
    if(!name)return toast("Enter name");
    let branchId=mainBranch();
    if(role==="manager"){if(pass!=="hummerusa")return toast("Wrong manager password")}
    else{let acc=state.data.allowedStaff.find(s=>s.active&&s.role===role&&same(s.name,name)&&String(s.password)===String(pass));if(!acc)return toast("Name or password not approved");branchId=acc.branchId}
    state.session={name,role,branchId};localStorage.setItem(KEY,JSON.stringify(state.session));tagPush(name,role,branchId);await requestPush();render();toast("Welcome "+name);
  }
  if(t.id==="logout"){localStorage.removeItem(KEY);state.session=null;render()}
  let tab=t.closest("[data-tab]");if(tab){state.tab=tab.dataset.tab;render()}
  if(t.id==="refresh")await refresh(true);
  if(t.id==="newOrder"||t.id==="dashNew")newDraft();
  if(t.id==="closeForm"){state.draftOpen=false;render()}
  if(t.id==="addRow"){draft.push({id:uid(),category:"cakes",name:"",qty:"1",urgent:false});renderRows()}
  if(t.dataset.remove){draft=draft.filter(i=>i.id!==t.dataset.remove);renderRows()}
  if(t.id==="saveOrder")await saveOrder();
  if(t.dataset.check){let [oid,iid]=t.dataset.check.split("|");let o=state.data.orders.find(x=>x.id===oid);let it=o?.items.find(x=>x.id===iid);if(it){it.received=t.checked;o.status=o.items.every(x=>x.received)?"completed":"pending";await save();render()}}
  if(t.dataset.cancel){let o=state.data.orders.find(x=>x.id===t.dataset.cancel);if(o){o.status="cancelled";await save();render()}}
  if(t.dataset.restore){let o=state.data.orders.find(x=>x.id===t.dataset.restore);if(o){o.status="pending";await save();render()}}
  if(t.dataset.delete){state.data.orders=state.data.orders.filter(o=>o.id!==t.dataset.delete);await save();render()}
  if(t.id==="addInv"&&canEditInv()){let name=prompt("Item name");if(name){state.data.inventory.push({id:uid(),branchId:state.session.branchId,name,category:"other",stock:Number(prompt("Current stock","0")||0),min:Number(prompt("Minimum","1")||1),unit:prompt("Unit","pcs")||"pcs"});await save();render()}}
  if((t.dataset.plus||t.dataset.minus)&&canEditInv()){let id=t.dataset.plus||t.dataset.minus,it=state.data.inventory.find(i=>i.id===id),step=Number(document.querySelector(`[data-step="${id}"]`)?.value||1);if(it){it.stock=t.dataset.plus?Number(it.stock)+step:Math.max(0,Number(it.stock)-step);await save();render()}}
  if(t.dataset.delinv&&canEditInv()){state.data.inventory=state.data.inventory.filter(i=>i.id!==t.dataset.delinv);await save();render()}
  if(t.id==="addBranch"&&canManage()){let n=prompt("Branch name");if(n){state.data.branches.push({id:uid(),name:n.trim()});await save();render()}}
  if(t.id==="addAcc"&&canManage())editAccount();
  if(t.dataset.editacc&&canManage())editAccount(state.data.allowedStaff.find(s=>s.id===t.dataset.editacc));
  if(t.dataset.toggleacc&&canManage()){let a=state.data.allowedStaff.find(s=>s.id===t.dataset.toggleacc);a.active=!a.active;await save();render()}
  if(t.dataset.delacc&&canManage()){state.data.allowedStaff=state.data.allowedStaff.filter(s=>s.id!==t.dataset.delacc);await save();render()}
  if(t.id==="enablePush")await requestPush();
  if(t.id==="testPush"){await sendPush({number:999,branchId:state.session.branchId});toast("Test push sent")}
  if(t.id==="export"){let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(state.data,null,2)],{type:"application/json"}));a.download="peer-backup.json";a.click()}
  if(t.id==="reset"&&confirm("Reset cloud data?")){seed();await save();render()}
});
async function editAccount(acc){
  let isNew=!acc; acc=acc||{id:uid(),active:true};
  let name=prompt("Name",acc.name||"");if(!name)return;
  let role=(prompt("Role: staff or kitchen",acc.role||"staff")||"staff").toLowerCase();if(!["staff","kitchen"].includes(role))return toast("Role must be staff or kitchen");
  let password=prompt("Password",acc.password||"1234");if(!password)return toast("Password required");
  let branchText=prompt("Branch: "+state.data.branches.map(b=>b.name).join(", "),branchName(acc.branchId||mainBranch()));
  let branch=state.data.branches.find(b=>same(b.name,branchText))||state.data.branches[0];
  Object.assign(acc,{name:name.trim(),role,password,branchId:branch.id,active:acc.active!==false});
  if(isNew)state.data.allowedStaff.push(acc);
  await save();render();
}
document.addEventListener("input",e=>{
  let row=e.target.closest("[data-row]");if(row){let item=draft.find(i=>i.id===row.dataset.row);let f=e.target.dataset.f;if(item&&f)item[f]=f==="urgent"?e.target.value==="true":e.target.value}
  if(e.target.id==="search"){state.query=e.target.value;renderOrders()}
});
document.addEventListener("change",e=>{
  if(e.target.id==="filter"){state.filter=e.target.value;renderOrders()}
  if(e.target.id==="branchFilter"){state.branchFilter=e.target.value;renderOrders()}
  let row=e.target.closest("[data-row]");if(row){let item=draft.find(i=>i.id===row.dataset.row);let f=e.target.dataset.f;if(item&&f)item[f]=f==="urgent"?e.target.value==="true":e.target.value}
});
setInterval(()=>$("clock")&&($("clock").textContent=new Date().toLocaleString("en-GB",{weekday:"short",day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})),1000);
load().then(()=>{ensureData();remember();realtime();render();setInterval(()=>{if(state.session)refresh(false)},5000)});
</script>
</body>
</html>
