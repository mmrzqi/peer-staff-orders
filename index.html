<style>
:root{--navy:#0B2545;--blue:#123a63;--cream:#f7f4ef;--ink:#0a0a0a;--muted:rgba(10,10,10,.55);--line:rgba(11,37,69,.14);--soft:rgba(11,37,69,.06);--white:#fff;--danger:#8b1e1e;--ok:#0f5b3a;--warn:#9a6b00;--radius:18px;--shadow:0 18px 45px rgba(11,37,69,.12);--font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif}*{box-sizing:border-box}html,body{margin:0}body{font-family:var(--font-body);background:linear-gradient(180deg,#fff 0%,var(--cream) 100%);color:var(--ink);-webkit-font-smoothing:antialiased}button,input,select,textarea{font:inherit;color:inherit}button{cursor:pointer}.hidden{display:none!important}.mono{font-variant-numeric:tabular-nums}.app-shell{min-height:100dvh}.topbar{position:sticky;top:0;z-index:40;background:rgba(11,37,69,.96);backdrop-filter:blur(14px);color:white;padding:12px 16px;box-shadow:0 6px 22px rgba(0,0,0,.16)}.topbar-inner{max-width:1180px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{display:flex;align-items:center;gap:12px}.logo-mark{width:38px;height:38px;border:1px solid rgba(255,255,255,.36);border-radius:50%;display:grid;place-items:center;font-family:var(--font-display);font-size:18px;font-weight:800;letter-spacing:-.04em}.brand-title{font-family:var(--font-display);font-weight:800;letter-spacing:.02em}.brand-sub{font-size:11px;opacity:.7}.top-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}.pill{border:1px solid rgba(255,255,255,.22);border-radius:999px;padding:7px 10px;font-size:12px;color:white;background:rgba(255,255,255,.06)}.btn{border:1.5px solid transparent;border-radius:12px;padding:11px 14px;font-weight:800;background:white;color:var(--navy);transition:.15s ease}.btn:hover{transform:translateY(-1px)}.btn-primary{background:var(--navy);color:white}.btn-outline{background:white;border-color:var(--navy);color:var(--navy)}.btn-ghost{background:transparent;border-color:var(--line);color:var(--ink)}.btn-danger{background:var(--danger);color:white}.btn-sm{padding:7px 10px;font-size:12px;border-radius:10px}.layout{max-width:1180px;margin:auto;padding:18px 16px 44px}.login-screen{min-height:100dvh;display:grid;place-items:center;padding:20px}.login-card{width:min(460px,100%);background:white;border:1px solid var(--line);border-radius:28px;box-shadow:var(--shadow);padding:28px}.login-card h1{font-family:var(--font-display);font-size:32px;margin:0 0 8px;color:var(--navy)}.login-card p{color:var(--muted);margin:0 0 20px;line-height:1.5}.field{display:grid;gap:7px;margin-bottom:14px}.field label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}input,select,textarea{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;background:white;outline:none}textarea{resize:vertical;min-height:72px}input:focus,select:focus,textarea:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(11,37,69,.08)}.demo-note{font-size:12px;background:var(--soft);border:1px dashed var(--line);padding:12px;border-radius:14px;line-height:1.55}.nav-tabs{display:flex;gap:8px;overflow:auto;padding:14px 0 18px}.nav-tabs button{white-space:nowrap;background:white;border:1px solid var(--line);border-radius:999px;padding:10px 14px;font-weight:800;color:var(--muted)}.nav-tabs button.active{background:var(--navy);color:white;border-color:var(--navy)}.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.stat-card{background:white;border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 8px 24px rgba(11,37,69,.06)}.stat-label{font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase}.stat-value{font-family:var(--font-display);font-size:30px;font-weight:800;color:var(--navy);margin-top:4px}.panel{background:white;border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 10px 28px rgba(11,37,69,.07);margin-bottom:16px}.panel-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.panel h2{font-family:var(--font-display);margin:0;color:var(--navy);font-size:22px}.panel p{color:var(--muted);line-height:1.55}.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}.item-entry{display:grid;grid-template-columns:1.1fr 1.8fr .9fr 1fr .7fr 38px;gap:10px;align-items:end;padding:10px 0;border-bottom:1px dashed var(--line)}.item-entry .field{margin-bottom:0}.board{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px}.ticket{border:1px solid var(--line);border-left:5px solid var(--navy);border-radius:20px;background:white;padding:16px;box-shadow:0 8px 24px rgba(11,37,69,.07);position:relative;overflow:hidden}.ticket.completed{border-left-color:var(--ok)}.ticket.cancelled{border-left-color:#999;opacity:.72}.ticket-head{display:flex;justify-content:space-between;gap:10px}.ticket-no{font-weight:900;color:var(--navy)}.ticket-date{font-size:12px;color:var(--muted)}.ticket-meta{font-size:13px;color:var(--muted);margin:8px 0 12px}.progress{height:8px;background:var(--soft);border-radius:999px;overflow:hidden}.bar{height:100%;background:var(--navy)}.group{margin-top:12px}.group-title{font-size:12px;font-weight:900;color:var(--navy);text-transform:uppercase}.line{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04)}.line input{width:auto}.name{flex:1}.qty{font-weight:800;white-space:nowrap}.badge{font-size:10px;font-weight:900;text-transform:uppercase;border-radius:999px;padding:4px 7px}.urgent{background:#111;color:white}.low{background:#fff4d6;color:var(--warn)}.done{text-decoration:line-through;color:var(--muted)}.ticket-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap}.toolbar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:14px}.toolbar input{max-width:300px}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px 8px;text-align:left;border-bottom:1px solid var(--line);font-size:14px}.table th{font-size:11px;text-transform:uppercase;color:var(--muted);letter-spacing:.06em}.status{font-size:12px;font-weight:900;border-radius:999px;padding:5px 8px;display:inline-block}.status.ok{background:#e7f6ee;color:var(--ok)}.status.warn{background:#fff4d6;color:var(--warn)}.status.danger{background:#fde7e7;color:var(--danger)}.analytics-bars{display:grid;gap:12px}.analytics-row{display:grid;grid-template-columns:130px 1fr 44px;gap:10px;align-items:center}.analytics-track{height:12px;background:var(--soft);border-radius:999px;overflow:hidden}.analytics-fill{height:100%;background:var(--navy)}.codebox{background:#071b32;color:#eaf2ff;border-radius:16px;padding:14px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.6}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:#111;color:white;padding:12px 18px;border-radius:14px;box-shadow:0 12px 32px rgba(0,0,0,.26);z-index:90}.mobile-fab{display:none;position:fixed;right:18px;bottom:18px;z-index:30;border-radius:999px;padding:15px 18px;box-shadow:0 14px 34px rgba(11,37,69,.22)}@media(max-width:760px){.topbar-inner{align-items:flex-start}.brand-sub,.pill.clock{display:none}.layout{padding:12px 12px 96px}.stats-grid,.grid-2,.grid-3{grid-template-columns:1fr}.panel{border-radius:18px;padding:14px}.panel-head{align-items:flex-start;flex-direction:column}.item-entry{grid-template-columns:1fr 1fr}.item-entry button{grid-column:auto}.board{grid-template-columns:1fr}.toolbar input{max-width:none}.table{display:block;overflow-x:auto}.mobile-fab{display:block}.desktop-new{display:none}.stat-value{font-size:26px}}
</style>

</head>
<body>
<div id="loginScreen" class="login-screen">
  <section class="login-card">
    <div class="logo-mark" style="background:var(--navy);color:white;margin-bottom:16px">P</div>
    <h1>Peer Staff Operations</h1>
    <p>Daily order lists, staff accounts, inventory alerts, and simple analytics for Peer Speciality Coffee.</p>
    <div class="field"><label>Staff name</label><input id="loginName" placeholder="e.g. Mohammed" autocomplete="name"></div>
    <div class="field"><label>Role</label><select id="loginRole"><option value="manager">Manager</option><option value="staff">Staff</option><option value="kitchen">Kitchen</option></select></div>
    <div class="field"><label>Password</label><input id="loginPassword" type="password" placeholder="Enter password"></div>
    <button class="btn btn-primary" id="loginBtn" style="width:100%">Enter app</button>
    <p class="demo-note">Cloud mode uses Supabase, so orders and inventory can sync across devices.</p>
  </section>
</div>

<div id="app" class="app-shell hidden">
  <header class="topbar"><div class="topbar-inner"><div class="brand"><div class="logo-mark">P</div><div><div class="brand-title">Peer Staff Operations</div><div class="brand-sub">Orders · Inventory · Analytics</div></div></div><div class="top-actions"><span class="pill" id="userPill"></span><span class="pill clock" id="clockPill"></span><button class="btn btn-sm" id="logoutBtn">Logout</button></div></div></header>
  <main class="layout">
    <nav class="nav-tabs" id="navTabs"></nav>
    <section id="dashboardView" class="view"></section>
    <section id="ordersView" class="view hidden"></section>
    <section id="inventoryView" class="view hidden"></section>
    <section id="staffView" class="view hidden"></section>
    <section id="analyticsView" class="view hidden"></section>
    <section id="settingsView" class="view hidden"></section>
  </main>
  <button class="btn btn-primary mobile-fab" id="mobileNewBtn">+ Order</button>
</div>

<div id="toast" class="toast hidden"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function(){
'use strict';

/* IMPORTANT:
   1. Replace the URL and anonKey below with your real Supabase details.
   2. In Supabase SQL Editor, run the SQL given in the chat.
*/
var DB_MODE='supabase';

var SUPABASE_CONFIG = {
  url: "https://vrgmdoyjdvndakgslbzr.supabase.co",
  anonKey: "sb_publishable_Wla1jlliD6AnFv3y26XeYg_LP5nXc45"
};

var supabaseClient = supabase.createClient(
  SUPABASE_CONFIG.url,
  SUPABASE_CONFIG.anonKey
);

var KEY='peer_ops_v2';
var CATEGORIES=[['cakes','🍰','Cakes'],['cookies','🍪','Cookies'],['drinks','🥤','Cups & Drinks'],['ingredients','🥛','Ingredients'],['coffee','☕','Coffee Beans'],['other','📦','Other']];
var state={session:null,active:'dashboard',filter:'pending',branchFilter:'all',query:'',draftOpen:false,data:{orders:[],inventory:[],staff:[],allowedStaff:[],branches:[]}};
var draft=[];

function $(id){return document.getElementById(id)}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}
function tomorrowISO(){var d=new Date();d.setDate(d.getDate()+1);return d.toISOString().slice(0,10)}
function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function fmt(iso){try{return new Date(iso+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'2-digit',month:'short'})}catch(e){return iso}}
function toast(msg){$('toast').textContent=msg;$('toast').classList.remove('hidden');clearTimeout(window.__t);window.__t=setTimeout(function(){$('toast').classList.add('hidden')},2200)}

async function save(){
  if(DB_MODE !== 'supabase'){return}
  var result = await supabaseClient
    .from("peer_data")
    .upsert({id:"main",data:state.data});
  if(result.error){toast("Save error: " + result.error.message)}
}

async function load(){
  var sess=localStorage.getItem(KEY+'_session');
  if(sess) state.session=JSON.parse(sess);

  if(SUPABASE_CONFIG.url.indexOf("PASTE_YOUR")>-1 || SUPABASE_CONFIG.anonKey.indexOf("PASTE_YOUR")>-1){
    seed();
    toast("Add your Supabase URL and anon key first");
    return;
  }

  var result = await supabaseClient
    .from("peer_data")
    .select("data")
    .eq("id","main")
    .single();

  if(result.error){
    seed();
    toast("Supabase error: " + result.error.message);
    return;
  }

  if(result.data && result.data.data){
    state.data = result.data.data;
    if(!state.data.allowedStaff) state.data.allowedStaff = [];
    if(!state.data.branches) state.data.branches = [{id:'main',name:'Main'}];
    state.data.orders.forEach(function(o){if(!o.branchId)o.branchId=getMainBranchId()});
    state.data.allowedStaff.forEach(function(s){if(!s.branchId)s.branchId=getMainBranchId(); if(s.password===undefined)s.password='1234'});
    state.data.inventory.forEach(function(i){if(!i.branchId)i.branchId=getMainBranchId()});
  }else{
    seed();
    await save();
  }
}

async function refreshData(showToast){
  var before={};
  (state.data.orders||[]).forEach(function(o){before[o.id]=true});

  var result = await supabaseClient
    .from("peer_data")
    .select("data")
    .eq("id","main")
    .single();

  if(result.error){
    if(showToast) toast("Refresh error: " + result.error.message);
    return;
  }

  if(result.data && result.data.data){
    var newData=result.data.data;
    if(!newData.allowedStaff) newData.allowedStaff=[];
    if(!newData.branches) newData.branches=[{id:'main',name:'Main'}];
    if(!newData.inventory) newData.inventory=[];
    if(!newData.orders) newData.orders=[];

    newData.orders.forEach(function(o){
      var forThisUser=canManage() || (state.session&&o.branchId===state.session.branchId);
      if(forThisUser && !before[o.id]) notifyOrder(o);
    });

    state.data=newData;
    rememberOrders();
    if(state.session) renderViews();
    if(showToast) toast("Orders refreshed");
  }
}



function seed(){
  state.data={
    orders:[],
    inventory:[
      {id:uid(),name:'12oz cups',branchId:'main',category:'drinks',stock:24,min:40,unit:'pcs'},
      {id:uid(),name:'7oz cups',branchId:'main',category:'drinks',stock:18,min:30,unit:'pcs'},
      {id:uid(),name:'Salted cream',branchId:'main',category:'ingredients',stock:2,min:4,unit:'bottles'},
      {id:uid(),name:'Condensed milk',branchId:'main',category:'ingredients',stock:1,min:3,unit:'tins'},
      {id:uid(),name:'Ethiopia Banko Gotiti',branchId:'main',category:'coffee',stock:0,min:2,unit:'bags'},
      {id:uid(),name:'Chicken breasts',branchId:'main',category:'ingredients',stock:1,min:5,unit:'pcs'}
    ],
    staff:[
      {id:uid(),name:'Mohammed',role:'manager',active:true},
      {id:uid(),name:'Kitchen Team',role:'kitchen',active:true},
      {id:uid(),name:'Barista',role:'staff',active:true}
    ],
    allowedStaff:[
      {id:uid(),name:'Kitchen Team',role:'kitchen',password:'1234',branchId:'main',active:true},
      {id:uid(),name:'Barista',role:'staff',password:'1234',branchId:'main',active:true}
    ],
    branches:[
      {id:'main',name:'Main'}
    ]
  };
}

function canManage(){return state.session&&state.session.role==='manager'}
function sameName(a,b){return String(a||'').trim().toLowerCase()===String(b||'').trim().toLowerCase()}
function branchName(id){var b=(state.data.branches||[]).find(function(x){return x.id===id});return b?b.name:'Main'}
function getMainBranchId(){if(!state.data.branches)state.data.branches=[];if(!state.data.branches.length)state.data.branches.push({id:'main',name:'Main'});return state.data.branches[0].id}
function allowedForLogin(name,role,password){
  return (state.data.allowedStaff||[]).find(function(s){
    return s.active && s.role===role && sameName(s.name,name) && String(s.password||'')===String(password||'');
  });
}
function visibleOrders(){
  if(canManage()) return state.data.orders;
  return state.data.orders.filter(function(o){return o.branchId===state.session.branchId});
}
function canEditInventory(){return state.session&&state.session.role==='kitchen'}
function canViewInventory(){return state.session&&(state.session.role==='manager'||state.session.role==='kitchen')}
function visibleInventory(){
  if(canManage()) return state.data.inventory;
  return state.data.inventory.filter(function(i){return i.branchId===state.session.branchId});
}
function requestNotify(){
  if(window.OneSignalDeferred){
    OneSignalDeferred.push(async function(OneSignal){
      try{
        await OneSignal.Notifications.requestPermission();
        toast('Notification request sent');
      }catch(e){
        if(!('Notification' in window)){toast('Notifications not supported on this browser');return}
        Notification.requestPermission().then(function(p){toast(p==='granted'?'Notifications enabled':'Notifications not enabled')});
      }
    });
    return;
  }
  if(!('Notification' in window)){toast('Notifications not supported on this browser');return}
  Notification.requestPermission().then(function(p){toast(p==='granted'?'Notifications enabled':'Notifications not enabled')});
}

function tagOneSignalUser(name,role,branchId){
  if(!window.OneSignalDeferred)return;
  OneSignalDeferred.push(async function(OneSignal){
    try{
      await OneSignal.login(String(name||'').toLowerCase());
      OneSignal.User.addTag("role", role);
      OneSignal.User.addTag("branchId", branchId);
      OneSignal.User.addTag("branch", branchName(branchId));
    }catch(e){console.log('OneSignal tag error',e)}
  });
}

function notifyOrder(o){
  if('Notification' in window && Notification.permission==='granted'){
    try{new Notification('New Peer order', {body:'Order No. '+String(o.number).padStart(3,'0')+' · '+branchName(o.branchId)});}catch(e){}
  }
}
async function sendPushForOrder(o){
  try{
    await supabaseClient.functions.invoke('send-order-notification', {
      body: {
        branchId: o.branchId || 'main',
        branchName: branchName(o.branchId),
        orderNo: 'No. ' + String(o.number).padStart(3,'0')
      }
    });
  }catch(e){
    console.log('Push function error', e);
  }
}

var knownOrderIds={};
function rememberOrders(){
  knownOrderIds={};
  (state.data.orders||[]).forEach(function(o){knownOrderIds[o.id]=true});
}
function setupRealtime(){
  try{
    supabaseClient.channel('peer_data_changes')
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'peer_data'},function(payload){
        if(!payload.new || !payload.new.data) return;
        var newData=payload.new.data;
        var newOrders=newData.orders||[];
        newOrders.forEach(function(o){
          var forThisUser=canManage() || (state.session&&o.branchId===state.session.branchId);
          if(forThisUser && !knownOrderIds[o.id]) notifyOrder(o);
        });
        state.data=newData;
        if(!state.data.branches) state.data.branches=[{id:'main',name:'Main'}];
        rememberOrders();
        if(state.session) renderViews();
      })
      .subscribe();
  }catch(e){}
}
function categoryLabel(key){var c=CATEGORIES.find(function(x){return x[0]===key});return c?c[1]+' '+c[2]:'📦 Other'}
function nextNo(){return state.data.orders.reduce(function(m,o){return Math.max(m,o.number||0)},0)+1}
function counts(){var orders=visibleOrders(),items=0,done=0,urgent=0;orders.forEach(function(o){if(o.status!=='cancelled')o.items.forEach(function(i){items++;if(i.received)done++;if(i.urgent)urgent++})});var low=visibleInventory().filter(function(i){return Number(i.stock)<=Number(i.min)}).length;return{pending:orders.filter(function(o){return o.status==='pending'}).length,completed:orders.filter(function(o){return o.status==='completed'}).length,cancelled:orders.filter(function(o){return o.status==='cancelled'}).length,items:items,done:done,urgent:urgent,low:low,staff:state.data.staff.filter(function(s){return s.active}).length}}
function appRender(){if(!state.session){$('loginScreen').classList.remove('hidden');$('app').classList.add('hidden');return}$('loginScreen').classList.add('hidden');$('app').classList.remove('hidden');$('userPill').textContent=state.session.name+' · '+state.session.role;renderTabs();renderViews();}
function renderTabs(){
  var tabs=[['dashboard','Dashboard'],['orders','Orders']];
  if(canViewInventory()) tabs.push(['inventory','Inventory']);
  if(canManage()) tabs.push(['staff','Staff']);
  tabs.push(['analytics','Analytics'],['settings','Settings']);
  if(!canViewInventory() && state.active==='inventory') state.active='dashboard';
  if(!canManage() && state.active==='staff') state.active='dashboard';
  $('navTabs').innerHTML=tabs.map(function(t){return '<button class="'+(state.active===t[0]?'active':'')+'" data-tab="'+t[0]+'">'+t[1]+'</button>'}).join('')
}
function showView(id){['dashboard','orders','inventory','staff','analytics','settings'].forEach(function(v){$(v+'View').classList.toggle('hidden',v!==id)})}
function renderViews(){showView(state.active);renderDashboard();renderOrders();renderInventory();renderStaff();renderAnalytics();renderSettings()}
function statCards(){var c=counts();return '<div class="stats-grid"><div class="stat-card"><div class="stat-label">Pending orders</div><div class="stat-value">'+c.pending+'</div></div><div class="stat-card"><div class="stat-label">Low stock</div><div class="stat-value">'+c.low+'</div></div><div class="stat-card"><div class="stat-label">Urgent items</div><div class="stat-value">'+c.urgent+'</div></div><div class="stat-card"><div class="stat-label">Active staff</div><div class="stat-value">'+c.staff+'</div></div></div>'}
function renderDashboard(){var low=visibleInventory().filter(function(i){return Number(i.stock)<=Number(i.min)});$('dashboardView').innerHTML=statCards()+'<div class="grid-2"><section class="panel"><div class="panel-head"><h2>Today / Tomorrow</h2><div><button class="btn btn-outline desktop-new" id="refreshOrders">↻ Refresh</button> <button class="btn btn-primary desktop-new" id="dashNew">+ New order</button></div></div><div class="board">'+filteredOrders('pending').slice(0,4).map(ticket).join('')+(filteredOrders('pending').length?'':'<p>No pending orders.</p>')+'</div></section>'+(canViewInventory()?'<section class="panel"><h2>Stock alerts</h2>'+low.map(function(i){return '<div class="line"><span class="name"><b>'+esc(i.name)+'</b><br><small>'+categoryLabel(i.category)+' · '+branchName(i.branchId)+'</small></span><span class="status danger">'+i.stock+' '+esc(i.unit)+' left</span></div>'}).join('')+(low.length?'':'<p>All inventory is above minimum level.</p>')+'</section>':'')+'</div>'}
function orderForm(){var disabled=!state.draftOpen?' hidden':'';return '<section class="panel'+disabled+'" id="orderForm"><div class="panel-head"><h2>New order</h2><button class="btn btn-ghost btn-sm" id="closeForm">Close</button></div><div class="grid-3"><div class="field"><label>Needed date</label><input type="date" id="orderDate" value="'+tomorrowISO()+'"></div><div class="field"><label>Ordered by</label><input id="orderedBy" value="'+esc(state.session.name)+'"></div><div class="field"><label>Note</label><input id="orderNote" placeholder="Optional"></div></div><div id="itemRows"></div><button class="btn btn-outline" id="addItem">+ Add item</button> <button class="btn btn-primary" id="saveOrder">Confirm order</button></section>'}
function renderOrders(){$('ordersView').innerHTML='<div class="toolbar"><div><button class="btn btn-primary" id="newOrder">+ New order</button> <button class="btn btn-outline" id="refreshOrders">↻ Refresh</button></div>'+(canManage()?'<select id="branchFilter"><option value="all">All branches</option>'+((state.data.branches||[]).map(function(b){return '<option value="'+b.id+'">'+esc(b.name)+'</option>'}).join(''))+'</select>':'')+'<input id="searchOrders" placeholder="Search orders or items" value="'+esc(state.query)+'"></div>'+orderForm()+'<section class="panel"><div class="panel-head"><h2>Order board</h2><select id="filterOrders"><option value="pending">Pending</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option><option value="all">All</option></select></div><div class="board">'+filteredOrders(state.filter).map(ticket).join('')+(filteredOrders(state.filter).length?'':'<p>No orders found.</p>')+'</div></section>';var f=$('filterOrders');if(f)f.value=state.filter;var bf=$('branchFilter');if(bf)bf.value=state.branchFilter;if(state.draftOpen)renderDraftRows()}
function filteredOrders(filter){var q=state.query.toLowerCase();return visibleOrders().filter(function(o){if(filter!=='all'&&o.status!==filter)return false;if(canManage()&&state.branchFilter!=='all'&&o.branchId!==state.branchFilter)return false;if(!q)return true;return (o.orderedBy+' '+o.note+' '+o.items.map(function(i){return i.name}).join(' ')).toLowerCase().indexOf(q)>-1}).sort(function(a,b){return new Date(b.createdAt)-new Date(a.createdAt)})}
function ticket(o){var total=o.items.length,done=o.items.filter(function(i){return i.received}).length,pct=total?Math.round(done/total*100):0;var groups=CATEGORIES.map(function(c){var its=o.items.filter(function(i){return i.category===c[0]});if(!its.length)return'';return '<div class="group"><div class="group-title">'+c[1]+' '+c[2]+'</div>'+its.map(function(i){return '<label class="line"><input type="checkbox" data-check="'+o.id+'|'+i.id+'" '+(i.received?'checked':'')+' '+(o.status==='cancelled'?'disabled':'')+'><span class="name '+(i.received?'done':'')+'">'+esc(i.name)+'</span><span class="qty">'+esc(i.qty)+'</span>'+(i.stock?'<span class="badge low">'+esc(i.stock)+'</span>':'')+(i.urgent?'<span class="badge urgent">Urgent</span>':'')+'</label>'}).join('')+'</div>'}).join('');return '<article class="ticket '+o.status+'"><div class="ticket-head"><span class="ticket-no">No. '+String(o.number).padStart(3,'0')+'</span><span class="ticket-date">'+fmt(o.date)+'</span></div><div class="ticket-meta">By <b>'+esc(o.orderedBy)+'</b> · '+done+'/'+total+' received'+(o.note?' · '+esc(o.note):'')+'</div><div class="progress"><div class="bar" style="width:'+pct+'%"></div></div>'+groups+'<div class="ticket-footer">'+(o.status==='pending'?'<button class="btn btn-outline btn-sm" data-cancel="'+o.id+'">Cancel</button>':'')+(o.status==='cancelled'?'<button class="btn btn-outline btn-sm" data-restore="'+o.id+'">Restore</button><button class="btn btn-danger btn-sm" data-delete="'+o.id+'">Delete</button>':'')+'</div></article>'}
function newDraft(){state.draftOpen=true;draft=[{id:uid(),category:'cakes',name:'',qty:'',stock:'',urgent:false}];state.active='orders';renderViews()}
function renderDraftRows(){var rows=draft.map(function(i){return '<div class="item-entry" data-row="'+i.id+'"><div class="field"><label>Category</label><select data-f="category">'+CATEGORIES.map(function(c){return '<option value="'+c[0]+'" '+(i.category===c[0]?'selected':'')+'>'+c[1]+' '+c[2]+'</option>'}).join('')+'</select></div><div class="field"><label>Item</label><input data-f="name" value="'+esc(i.name)+'" placeholder="Tiramisu"></div><div class="field"><label>Qty</label><input data-f="qty" value="'+esc(i.qty)+'" placeholder="4 pcs"></div><div class="field"><label>Stock now</label><input data-f="stock" value="'+esc(i.stock)+'" placeholder="1 left"></div><div class="field"><label>Urgent</label><select data-f="urgent"><option value="false">No</option><option value="true" '+(i.urgent?'selected':'')+'>Yes</option></select></div><button class="btn btn-ghost" data-remove-row="'+i.id+'">×</button></div>'}).join('');$('itemRows').innerHTML=rows}
async function saveOrder(){var orderedBy=$('orderedBy').value.trim();var items=draft.filter(function(i){return i.name.trim()}).map(function(i){return{id:i.id,category:i.category,name:i.name.trim(),qty:i.qty.trim()||'1',stock:i.stock.trim(),urgent:!!i.urgent,received:false}});if(!orderedBy||!items.length){toast('Add staff name and at least one item');return}var newOrder={id:uid(),number:nextNo(),branchId:state.session.branchId||getMainBranchId(),date:$('orderDate').value||tomorrowISO(),orderedBy:orderedBy,note:$('orderNote').value.trim(),status:'pending',createdAt:new Date().toISOString(),createdBy:state.session.name,items:items};state.data.orders.unshift(newOrder);state.draftOpen=false;draft=[];await save();notifyOrder(newOrder);await sendPushForOrder(newOrder);toast('Order added and notification sent');renderViews()}
function renderInventory(){
  if(!canViewInventory()){
    $('inventoryView').innerHTML='<section class="panel"><h2>Inventory</h2><p>Inventory is only available to Kitchen and Manager accounts.</p></section>';
    return;
  }
  var rows=visibleInventory().map(function(i){
    var low=Number(i.stock)<=Number(i.min);
    var controls=canEditInventory()
      ? '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap"><button class="btn btn-sm btn-outline" data-stock-minus="'+i.id+'">−</button><input style="width:75px;padding:7px" type="number" value="1" min="1" data-stock-step="'+i.id+'"><button class="btn btn-sm btn-outline" data-stock-plus="'+i.id+'">+</button><button class="btn btn-sm btn-ghost" data-del-inv="'+i.id+'">Delete</button></div>'
      : '<span class="status ok">View only</span>';
    return '<tr><td><b>'+esc(i.name)+'</b><br><small>'+esc(branchName(i.branchId))+'</small></td><td>'+categoryLabel(i.category)+'</td><td><b>'+esc(i.stock)+'</b> '+esc(i.unit)+'</td><td>'+esc(i.min)+'</td><td><span class="status '+(low?'danger':'ok')+'">'+(low?'Low':'OK')+'</span></td><td>'+controls+'</td></tr>'
  }).join('');

  $('inventoryView').innerHTML='<section class="panel"><div class="panel-head"><h2>Inventory tracking</h2>'+(canEditInventory()?'<button class="btn btn-primary" id="addInventory">+ Add inventory item</button>':'')+'</div><p>'+(canEditInventory()?'Kitchen can add stock items and use + / − to count stock.':'Manager can view inventory only. Staff cannot view inventory.')+'</p><table class="table"><thead><tr><th>Item</th><th>Category</th><th>Current</th><th>Minimum</th><th>Status</th><th>Stock count</th></tr></thead><tbody>'+rows+'</tbody></table></section>'
}
function renderStaff(){
  var branchOptions=(state.data.branches||[]).map(function(b){return esc(b.name)}).join(', ');
  var approved=(state.data.allowedStaff||[]).map(function(s){
    return '<tr><td><b>'+esc(s.name)+'</b></td><td>'+esc(s.role)+'</td><td>'+esc(branchName(s.branchId))+'</td><td>'+esc(s.password||'')+'</td><td><span class="status '+(s.active?'ok':'warn')+'">'+(s.active?'Allowed':'Blocked')+'</span></td><td>'+(canManage()?'<button class="btn btn-sm btn-outline" data-edit-allowed="'+s.id+'">Edit</button> <button class="btn btn-sm btn-outline" data-toggle-allowed="'+s.id+'">Toggle</button> <button class="btn btn-sm btn-ghost" data-del-allowed="'+s.id+'">Remove</button>':'Manager access only')+'</td></tr>'
  }).join('');

  var logins=state.data.staff.map(function(s){
    return '<tr><td><b>'+esc(s.name)+'</b></td><td>'+esc(s.role)+'</td><td>'+esc(branchName(s.branchId))+'</td><td><span class="status '+(s.active?'ok':'warn')+'">'+(s.active?'Active':'Off')+'</span></td><td>'+(canManage()?'<button class="btn btn-sm btn-outline" data-toggle-staff="'+s.id+'">Toggle</button> <button class="btn btn-sm btn-ghost" data-del-staff="'+s.id+'">Delete</button>':'Manager access only')+'</td></tr>'
  }).join('');

  $('staffView').innerHTML=
    '<section class="panel"><div class="panel-head"><h2>Branches</h2>'+(canManage()?'<button class="btn btn-primary" id="addBranch">+ Add branch</button>':'')+'</div><p>Current branches: '+(branchOptions||'Main')+'</p></section>'+
    '<section class="panel"><div class="panel-head"><h2>Approved staff access</h2>'+(canManage()?'<button class="btn btn-primary" id="addAllowedStaff">+ Add approved staff</button>':'')+'</div><p>Names are accepted in uppercase or lowercase. Staff and Kitchen must use their own password.</p><table class="table"><thead><tr><th>Name</th><th>Role</th><th>Branch</th><th>Password</th><th>Access</th><th></th></tr></thead><tbody>'+approved+'</tbody></table></section>'+
    '<section class="panel"><div class="panel-head"><h2>Login history / staff accounts</h2>'+(canManage()?'<button class="btn btn-primary" id="addStaff">+ Add staff account</button>':'')+'</div><table class="table"><thead><tr><th>Name</th><th>Role</th><th>Branch</th><th>Status</th><th></th></tr></thead><tbody>'+logins+'</tbody></table></section>'
}
function renderAnalytics(){var byCat={};state.data.orders.forEach(function(o){if(o.status!=='cancelled')o.items.forEach(function(i){byCat[i.category]=(byCat[i.category]||0)+1})});var max=Math.max(1,...Object.values(byCat));var bars=CATEGORIES.map(function(c){var v=byCat[c[0]]||0;return '<div class="analytics-row"><b>'+c[1]+' '+c[2]+'</b><div class="analytics-track"><div class="analytics-fill" style="width:'+(v/max*100)+'%"></div></div><span>'+v+'</span></div>'}).join('');var c=counts(),rate=c.items?Math.round(c.done/c.items*100):0;$('analyticsView').innerHTML=statCards()+'<section class="panel"><h2>Analytics</h2><p>Completion rate: <b>'+rate+'%</b>. Total items received: <b>'+c.done+'/'+c.items+'</b>.</p><div class="analytics-bars">'+bars+'</div></section>'}
function renderSettings(){$('settingsView').innerHTML='<section class="panel"><h2>Notifications</h2><p><b>Notification troubleshooting:</b> If you do not receive notifications, first open from iPhone Home Screen, login, tap Enable notifications, then tap Test push. Also check OneSignal → Audience → Subscriptions. For iPhone notifications, open this site in Safari, add it to Home Screen, then tap Enable notifications. This static GitHub version can notify active/home-screen sessions through Supabase realtime. True closed-app push needs a PWA service worker plus a push provider/server such as OneSignal or a Supabase Edge Function.</p></section><section class="panel"><h2>Database connection</h2><p>This version uses <b>Supabase cloud database</b>. If data does not sync, check your Supabase URL, anon key, table name, and RLS policy.</p><div class="codebox">DB_MODE = "supabase";\nSUPABASE_CONFIG = {\n  url: "YOUR_SUPABASE_URL",\n  anonKey: "YOUR_SUPABASE_ANON_KEY"\n};\n\nTable used: peer_data\nRow used: id = main</div></section><section class="panel"><h2>Deployment</h2><p><b>GitHub Pages:</b> upload this file as <b>index.html</b>, then enable Pages from Settings → Pages.</p></section><section class="panel"><h2>Backup</h2><button class="btn btn-outline" id="enableNotifications">Enable notifications</button> <button class="btn btn-outline" id="testPushNotification">Test push</button> <button class="btn btn-outline" id="testLocalNotification">Test notification</button> <button class="btn btn-outline" id="exportData">Export JSON backup</button> <button class="btn btn-danger" id="resetData">Reset cloud data</button></section>'}
function tick(){var el=$('clockPill');if(el)el.textContent=new Date().toLocaleString('en-GB',{weekday:'short',day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}

document.addEventListener('click',async function(e){
  var t=e.target;
  if(t.id==='loginBtn'){
    var name=$('loginName').value.trim();
    var role=$('loginRole').value;
    var pass=$('loginPassword').value;

    if(!name){toast('Enter your staff name');return}

    var loginBranchId=getMainBranchId();

    if(role==='manager'){
      if(pass !== 'hummerusa'){toast('Wrong manager password');return}
    }else{
      var approved=allowedForLogin(name,role,pass);
      if(!approved){toast('Access denied: name or password is wrong');return}
      loginBranchId=approved.branchId||getMainBranchId();
    }

    state.session={name:name,role:role,branchId:loginBranchId};
    localStorage.setItem(KEY+'_session',JSON.stringify(state.session));
    tagOneSignalUser(name,role,loginBranchId);

    if(!state.data.staff.some(function(s){return sameName(s.name,name)})){
      state.data.staff.push({id:uid(),name:name,role:state.session.role,active:true,branchId:loginBranchId});
      await save();
    }

    if(window.OneSignalDeferred){
      OneSignalDeferred.push(async function(OneSignal){
        try{
          await OneSignal.login(name.toLowerCase());
          OneSignal.User.addTag("role", role);
          OneSignal.User.addTag("branch", branchName(loginBranchId));
          OneSignal.User.addTag("branchId", loginBranchId);
        }catch(e){}
      });
    }

    if('Notification' in window && Notification.permission==='default') requestNotify();

    appRender();toast('Welcome '+name)
  }
  if(t.id==='logoutBtn'){localStorage.removeItem(KEY+'_session');state.session=null;appRender()}
  var tab=t.closest('[data-tab]');if(tab){state.active=tab.dataset.tab;appRender()}
  if(t.id==='refreshOrders')await refreshData(true);
  if(t.id==='newOrder'||t.id==='dashNew'||t.id==='mobileNewBtn')newDraft();
  if(t.id==='closeForm'){state.draftOpen=false;renderViews()}
  if(t.id==='addItem'){draft.push({id:uid(),category:'cakes',name:'',qty:'',stock:'',urgent:false});renderDraftRows()}
  if(t.dataset.removeRow){draft=draft.filter(function(i){return i.id!==t.dataset.removeRow});renderDraftRows()}
  if(t.id==='saveOrder')await saveOrder();
  if(t.dataset.cancel){var o=state.data.orders.find(function(x){return x.id===t.dataset.cancel});if(o){o.status='cancelled';await save();renderViews()}}
  if(t.dataset.restore){var r=state.data.orders.find(function(x){return x.id===t.dataset.restore});if(r){r.status=r.items.every(function(i){return i.received})?'completed':'pending';await save();renderViews()}}
  if(t.dataset.delete){state.data.orders=state.data.orders.filter(function(o){return o.id!==t.dataset.delete});await save();renderViews()}
  if(t.id==='addInventory'&&canEditInventory()){
    var name=prompt('Item name');
    if(name){
      var stock=Number(prompt('Current stock number','0')||0);
      var min=Number(prompt('Minimum stock alert number','1')||1);
      var unit=prompt('Unit, e.g. pcs, bags, bottles','pcs')||'pcs';
      state.data.inventory.push({id:uid(),name:name,branchId:state.session.branchId||getMainBranchId(),category:'other',stock:stock,min:min,unit:unit});
      await save();renderViews()
    }
  }
  if((t.dataset.stockPlus||t.dataset.stockMinus)&&canEditInventory()){
    var id=t.dataset.stockPlus||t.dataset.stockMinus;
    var it=state.data.inventory.find(function(i){return i.id===id});
    var inp=document.querySelector('[data-stock-step="'+id+'"]');
    var step=Math.max(1,Number(inp&&inp.value?inp.value:1));
    if(it){
      if(t.dataset.stockPlus) it.stock=Number(it.stock)+step;
      if(t.dataset.stockMinus) it.stock=Math.max(0,Number(it.stock)-step);
      await save();renderViews()
    }
  }
  if(t.dataset.delInv&&canEditInventory()){state.data.inventory=state.data.inventory.filter(function(i){return i.id!==t.dataset.delInv});await save();renderViews()}
  if(t.id==='addBranch'&&canManage()){
    var b=prompt('Branch name');
    if(b){
      if(!state.data.branches)state.data.branches=[];
      state.data.branches.push({id:uid(),name:b.trim()});
      await save();renderViews()
    }
  }
  if(t.id==='addAllowedStaff'&&canManage()){
    var n=prompt('Approved staff/kitchen name');
    if(n){
      var role=prompt('Role: type staff or kitchen','staff');
      role=(role||'staff').toLowerCase().trim();
      if(role!=='staff' && role!=='kitchen'){toast('Role must be staff or kitchen');return}
      var password=prompt('Password for '+n,'1234');
      if(!password){toast('Password required');return}
      var branches=(state.data.branches||[]);
      var branchText=prompt('Branch name: '+branches.map(function(b){return b.name}).join(', '), branchName(getMainBranchId()));
      var branch=branches.find(function(b){return sameName(b.name,branchText)}) || branches[0];
      if(!state.data.allowedStaff) state.data.allowedStaff=[];
      state.data.allowedStaff.push({id:uid(),name:n.trim(),role:role,password:password,branchId:branch.id,active:true});
      await save();renderViews()
    }
  }
  if(t.dataset.editAllowed&&canManage()){
    var a=(state.data.allowedStaff||[]).find(function(x){return x.id===t.dataset.editAllowed});
    if(a){
      var n=prompt('Name',a.name); if(!n)return;
      var role=prompt('Role: staff or kitchen',a.role); role=(role||a.role).toLowerCase().trim();
      if(role!=='staff' && role!=='kitchen'){toast('Role must be staff or kitchen');return}
      var password=prompt('Password',a.password||''); if(!password){toast('Password required');return}
      var branches=(state.data.branches||[]);
      var branchText=prompt('Branch name: '+branches.map(function(b){return b.name}).join(', '), branchName(a.branchId));
      var branch=branches.find(function(b){return sameName(b.name,branchText)}) || branches[0];
      a.name=n.trim(); a.role=role; a.password=password; a.branchId=branch.id;
      await save();renderViews()
    }
  }
  if(t.dataset.toggleAllowed&&canManage()){
    var a=(state.data.allowedStaff||[]).find(function(x){return x.id===t.dataset.toggleAllowed});
    if(a){a.active=!a.active;await save();renderViews()}
  }
  if(t.dataset.delAllowed&&canManage()){
    state.data.allowedStaff=(state.data.allowedStaff||[]).filter(function(s){return s.id!==t.dataset.delAllowed});
    await save();renderViews()
  }
  if(t.id==='addStaff'&&canManage()){var n=prompt('Staff name');if(n){state.data.staff.push({id:uid(),name:n,role:'staff',active:true,branchId:getMainBranchId()});await save();renderViews()}}
  if(t.dataset.toggleStaff&&canManage()){var s=state.data.staff.find(function(x){return x.id===t.dataset.toggleStaff});s.active=!s.active;await save();renderViews()}
  if(t.dataset.delStaff&&canManage()){state.data.staff=state.data.staff.filter(function(s){return s.id!==t.dataset.delStaff});await save();renderViews()}
  if(t.id==='enableNotifications'){requestNotify()}
  if(t.id==='testPushNotification'){
    await sendPushForOrder({number:999,branchId:state.session&&state.session.branchId?state.session.branchId:getMainBranchId()});
    toast('Test push sent');
  }
  if(t.id==='testLocalNotification'){
    if('Notification' in window && Notification.permission==='granted'){
      new Notification('Peer test notification',{body:'Notifications are enabled on this device.'});
    }else{
      requestNotify();
      toast('Allow notifications first, then test again');
    }
  }
  if(t.id==='exportData'){var blob=new Blob([JSON.stringify(state.data,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='peer-operations-backup.json';a.click()}
  if(t.id==='resetData'&&confirm('Reset cloud data?')){seed();await save();renderViews()}
});

document.addEventListener('input',function(e){var row=e.target.closest('[data-row]');if(row){var item=draft.find(function(i){return i.id===row.dataset.row});var f=e.target.dataset.f;if(item&&f){item[f]=f==='urgent'?e.target.value==='true':e.target.value}}if(e.target.id==='searchOrders'){state.query=e.target.value;renderOrders()}});
document.addEventListener('change',async function(e){if(e.target.id==='filterOrders'){state.filter=e.target.value;renderOrders()}if(e.target.id==='branchFilter'){state.branchFilter=e.target.value;renderOrders()}var row=e.target.closest('[data-row]');if(row){var item=draft.find(function(i){return i.id===row.dataset.row});var f=e.target.dataset.f;if(item&&f){item[f]=f==='urgent'?e.target.value==='true':e.target.value}}if(e.target.dataset.check){var p=e.target.dataset.check.split('|'),o=state.data.orders.find(function(x){return x.id===p[0]});if(o){var it=o.items.find(function(i){return i.id===p[1]});if(it){it.received=e.target.checked;o.status=o.items.every(function(i){return i.received})?'completed':'pending';await save();renderViews()}}}});

load().then(function(){
  rememberOrders();
  setupRealtime();
  tick();
  setInterval(tick,30000);
  setInterval(function(){ if(state.session) refreshData(false); }, 8000);
  appRender();
});
})();
</script>
